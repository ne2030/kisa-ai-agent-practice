# 2일차 비용 평가 기준 데이터셋
#
# 모델 비용 비교를 느낌으로 끝내지 않고, 기준 데이터와 평가 리포트로 확인해요.

- id: latest-status-wins
  title: 최신 배송 상태 기준 안내
  task_type: policy_resolution
  input: |
    [고객 문의]
    ORD-4219 배송지를 바꾸고 싶어요. 오전에 상담사에게 아직 출고 전이라고 들었어요.

    [상담 메모]
    - 09:10 이전 상담 메모: 고객이 배송지 변경을 요청함. 화면에는 아직 출고 준비 중으로 보였음.
    - 09:25 물류 이벤트: 송장 생성 완료. 상태값 LABEL_CREATED.
    - 09:43 물류 이벤트: 택배사 픽업 완료. 상태값 PICKED_UP.
    - 09:50 최신 물류 상태: IN_TRANSIT.

    [운영 정책]
    송장 생성 전에는 배송지 변경 가능.
    LABEL_CREATED 이후에는 배송지 변경 불가.
    PICKED_UP 이후에는 출고 보류도 불가.
    상담 메모와 물류 이벤트가 충돌하면 가장 늦은 시각의 물류 이벤트를 우선한다.
  expected:
    min_score: 5
    required_terms:
      - "ORD-4219"
      - "LABEL_CREATED"
      - "PICKED_UP"
      - "IN_TRANSIT"
      - "배송지 변경"
      - "불가"
      - "최신"
    forbidden_terms:
      - "현재 배송지 변경 가능"
      - "배송지 변경 가능합니다"
      - "출고 보류 가능합니다"
      - "배송지 변경 처리했습니다"
      - "출고 전 상태입니다"
    rubric:
      correctness: ORD-4219의 최신 상태가 IN_TRANSIT이고, LABEL_CREATED 이후 배송지 변경 불가라는 결론을 함께 말해야 해요.
      groundedness: 오전 상담 메모만 보고 배송지 변경 가능, 출고 보류 가능, 출고 전이라고 확정하면 안 돼요.
      usefulness: 고객에게 안내할 결론과 근거가 된 최신 물류 이벤트를 분리하면 좋아요.

- id: policy-conflict-resolution
  title: 취소/주소 변경/환불 정책 충돌 정리
  task_type: policy_resolution
  input: |
    [고객지원 티켓 묶음]
    - 09:12 한유진: ORD-2044 주문을 취소하고 싶어요. 배송지는 회사가 아니라 집으로 바꿔야 해요. 결제 카드는 분실해서 다른 카드로 환불 받고 싶어요.
    - 09:16 상담 메모: ORD-2044는 결제 완료. 상품은 프리미엄 요거트 12개입(냉장)과 텀블러 1개. 물류센터 C-3에서 처리 중.
    - 09:18 물류 이벤트: 송장 생성 완료. 택배사 픽업은 아직 안 됨. WMS 상태값은 LABEL_CREATED.
    - 09:24 운영 메모: 냉장 상품은 주소 변경 인터셉트 제외. 상온 상품만 택배사 인터셉트 가능하며 수수료 3,000원.
    - 09:31 고객 추가 메시지: 오늘 10:30 회의 전까지 답 주세요. 집 주소는 서울시 마포구로 바꾸고 싶어요.
    - 09:40 정책 문서 A: 송장 생성 전에는 주소 변경 가능. 송장 생성 후에는 주소 변경 불가. 단, 택배사 픽업 전이면 WMS-HOLD로 출고 보류 후 취소 요청 가능.
    - 09:42 정책 문서 B: 냉장 상품은 출고 보류 성공 전까지 취소 확정 안내 금지. 픽업 후에는 취소 불가, 수령 후 반품 검토만 가능.
    - 09:44 결제 정책: 환불은 원결제수단으로만 가능. 분실 카드라도 카드사 통해 원결제수단 환불로 처리. 다른 카드 환불 불가.
    - 09:47 물류 메모: C-3 픽업 마감은 10:00. 10:00 전 WMS-HOLD 성공 여부를 확인해야 함.
    - 09:52 상담 리더 메모: 고객에게 취소 확정이라고 말하지 말고, 10:00 전 WMS-HOLD 시도와 결과 확인 후 안내. 주소 변경은 냉장 포함 주문이라 불가로 안내.
  expected:
    min_score: 5
    required_terms:
      - "ORD-2044"
      - "LABEL_CREATED"
      - "WMS-HOLD"
      - "10:00"
      - "냉장"
      - "주소 변경"
      - "원결제수단"
      - "환불은 불가"
      - "안내 금지"
    forbidden_terms:
      - "취소 확정 처리"
      - "주소 변경 가능합니다"
      - "다른 카드로 환불 가능"
      - "3,000원으로 주소 변경"
      - "픽업 후 취소 가능"
    rubric:
      correctness: ORD-2044의 현재 상태, WMS-HOLD 마감, 냉장 주소 변경 불가, 원결제수단 환불 제한을 함께 말해야 해요.
      groundedness: 취소 확정 처리, 주소 변경 가능, 다른 카드 환불 가능처럼 정책과 반대되는 결론을 내면 안 돼요.
      usefulness: 고객에게 바로 말할 내용과 내부에서 확인할 WMS-HOLD 결과를 분리해야 해요.

- id: cx-ticket-bundle
  title: 고객지원 티켓 묶음 요약
  task_type: summary
  input: |
    [고객지원 티켓 묶음]
    - 09:12 김민준: 어제 주문한 무선 키보드가 아직 출고 준비 중이라고 나와요. 선물이라 금요일 전에는 꼭 필요해요.
    - 09:18 상담 메모: ORD-1001은 결제 완료, 재고는 있음. 물류센터 W-2에서 송장 생성이 지연됨.
    - 10:03 이서연: 러닝화 사이즈가 작아서 반품하고 싶어요. 배송 완료일은 5월 1일이고 착용은 실내에서만 해봤어요.
    - 10:20 상담 메모: 반품 가능 기간 14일 이내. 상품 훼손 여부는 회수 후 확인 필요.
    - 11:05 박지훈: 배송 지연 보상 쿠폰을 받을 수 있나요? 도착 예정일보다 3일 늦었어요.
    - 11:30 운영 메모: VIP 고객은 배송 지연 2일 이상이면 최대 5,000원 쿠폰 가능. 일반 고객은 상담 티켓으로 수동 검토.
    - 12:10 물류 공지: 오늘 오전 송장 API 지연이 있었고 14:00에 정상화 예정. 이미 접수된 주문은 순차 처리.
  expected:
    min_score: 4
    required_terms:
      - "송장"
      - "W-2"
      - "14:00"
      - "반품"
      - "14일"
      - "VIP"
      - "5,000원"
    forbidden_terms:
      - "전액 보상"
      - "자동 환불"
      - "이미 배송 완료"
      - "무조건 지급"
    rubric:
      correctness: 송장 지연, 반품 조건, VIP 보상 조건을 섞지 않고 말해야 해요.
      groundedness: 원문에 없는 환불 확정, 보상 확정, 배송 완료를 만들면 안 돼요.
      usefulness: 운영자가 바로 볼 수 있게 다음 조치와 불확실한 내용을 분리하면 좋아요.

- id: refund-policy-check
  title: 반품 가능성 판단
  task_type: policy_check
  input: |
    [고객 문의]
    러닝화 사이즈가 작아서 반품하고 싶어요. 배송 완료일은 5월 1일이고 착용은 실내에서만 해봤어요.

    [상담 정책]
    반품 가능 기간은 배송 완료 후 14일 이내입니다. 단, 상품 훼손 여부는 회수 후 확인해야 합니다. 실외 착용 흔적이 있으면 반품이 거절될 수 있습니다.
  expected:
    min_score: 4
    required_terms:
      - "14일"
      - "회수"
      - "훼손"
      - "확인"
    forbidden_terms:
      - "반품 확정"
      - "무조건 가능"
      - "즉시 환불"
      - "실외 착용"
    rubric:
      correctness: 기간상 접수 가능성과 최종 승인 여부를 구분해야 해요.
      groundedness: 훼손 여부 확인 전 반품 확정이라고 말하면 안 돼요.
      usefulness: 고객에게 다음 절차를 짧게 안내하면 좋아요.

- id: vip-delay-compensation
  title: 배송 지연 보상 검토
  task_type: policy_check
  input: |
    [고객 문의]
    VIP 고객입니다. 도착 예정일보다 3일 늦었는데 배송 지연 보상 쿠폰 받을 수 있나요?

    [운영 메모]
    VIP 고객은 배송 지연 2일 이상이면 최대 5,000원 쿠폰 가능. 일반 고객은 상담 티켓으로 수동 검토. 쿠폰 지급 전 실제 배송 완료일과 고객 등급을 확인해야 합니다.
  expected:
    min_score: 4
    required_terms:
      - "VIP"
      - "3일"
      - "2일 이상"
      - "5,000원"
      - "확인"
    forbidden_terms:
      - "전액 환불"
      - "무조건 지급"
      - "일반 고객도 자동 지급"
    rubric:
      correctness: VIP, 3일 지연, 2일 이상 조건, 최대 5,000원 한도를 포함해야 해요.
      groundedness: 지급 전 확인 절차를 빼고 확정하면 안 돼요.
      usefulness: 가능성이 높지만 확인 후 처리라는 톤이면 좋아요.
